# ClawDeck 配置文件
# 所有可调参数的集中管理，按模块分组
# 修改后需重新构建（npm run deploy）生效

# ============================================================
# 网关连接
# ============================================================
gateway:
  # 默认 WebSocket 连接地址
  default_ws_url: "ws://127.0.0.1:16968"
  # 连接失败关闭码（OpenClaw 官方定义，浏览器安全限制场景）
  connect_failed_close_code: 4008

# ============================================================
# 指数退避（WebSocket 断线重连策略）
# ============================================================
backoff:
  # 首次重连延迟（毫秒）
  initial_ms: 800
  # 每次重连延迟的递增倍数
  multiplier: 1.7
  # 最大重连延迟（毫秒）
  max_ms: 15000

# ============================================================
# 数据轮询
# ============================================================
polling:
  # 有活跃会话时的轮询间隔（毫秒）
  active_interval_ms: 5000
  # 无活跃会话时的轮询间隔（毫秒）
  idle_interval_ms: 30000
  # 重型轮询间隔：usage 统计、全量 session 下拉（毫秒）
  heavy_interval_ms: 60000
  # 连续多少次无活跃会话后切换到空闲轮询
  idle_count_threshold: 2

# ============================================================
# 会话管理
# ============================================================
session:
  # 活跃会话判定时间窗口（毫秒）—— 最近 N 毫秒内有更新的 session 视为"活跃"
  active_cutoff_ms: 120000

# ============================================================
# API 请求限制
# ============================================================
api_limits:
  # sessions.list 请求行数限制（活跃 session 列表）
  sessions_list: 100
  # 下拉选择器全量 session 限制
  sessions_dropdown: 200
  # usage 统计请求行数
  usage: 50
  # 定时任务列表限制
  cron_jobs: 50
  # 聊天历史记录限制（单 session）
  chat_history: 200
  # 会话预览数量（首页摘要）
  sessions_preview: 12
  # 日志尾部默认行数
  tail_logs: 100

# ============================================================
# AI 建议
# ============================================================
ai_advice:
  # 面板最大同时显示建议数
  max_count: 3
  # 连接成功后延迟多久请求 AI 建议（毫秒）
  delay_ms: 5000
  # Toast 通知自动隐藏时间（毫秒）
  toast_duration_ms: 2500

# ============================================================
# 日志系统
# ============================================================
logging:
  # 内存环形缓冲区最大条目数（log-panel / workshop-log-panel / debug-log 共用）
  max_entries: 200
  # 日志文件最大大小（字节）—— 5MB
  max_file_size_bytes: 5242880
  # 日志自动清理天数（0 = 不自动清理）
  cleanup_days: 0
  # 日志消息中附加数据的截断长度（字符）
  data_truncate_length: 300

# ============================================================
# 刷新频率追踪
# ============================================================
refresh_tracker:
  # 统计窗口（毫秒）
  window_ms: 10000
  # 高频警告阈值（窗口内超过 N 次触发警告）
  high_freq_threshold: 10
  # 中频提示阈值
  med_freq_threshold: 3

# ============================================================
# UI 动画与通知
# ============================================================
ui:
  # 通知（Toast）默认显示持续时间（毫秒）
  notification_duration_ms: 3000
  # 猫咪卡片发送成功动画时长（毫秒）
  card_success_animation_ms: 600
  # 猫咪卡片发送失败动画时长（毫秒）
  card_error_animation_ms: 1500
  # 猫咪卡片入场动画间隔（毫秒）—— 多张卡片依次入场的延迟
  card_enter_delay_ms: 80
  # Fallback 模型切换 Toast 超时（毫秒）
  fallback_toast_timeout_ms: 8000
  # 详情面板指标刷新间隔（毫秒）
  metrics_update_interval_ms: 2000

# ============================================================
# 遥测 / 内容预览
# ============================================================
telemetry:
  # Agent 消息内容预览最大长度（字符）
  max_content_preview: 500
  # 工具调用结果预览最大长度（字符）
  max_result_preview: 300
  # 敏感字符串脱敏截断长度（字符）
  max_sensitive_length: 100

# ============================================================
# 存储
# ============================================================
storage:
  # 设备认证 Token 的 LocalStorage key
  device_token_key: "openclaw.device.auth.v1"
